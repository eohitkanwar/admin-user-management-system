<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .settings-content {
            padding: 30px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4facfe;
        }

        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #4facfe;
        }

        .search-bar button {
            padding: 12px 24px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .search-bar button:hover {
            background: #3b8bfe;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .history-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e1e5e9;
        }

        .history-table td {
            padding: 15px;
            border-bottom: 1px solid #e1e5e9;
        }

        .history-table tr:hover {
            background: #f8f9fa;
        }

        .admin-badge {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .user-badge {
            background: #6c757d;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .date {
            color: #6c757d;
            font-size: 14px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #e1e5e9;
            background: white;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .pagination button:hover {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
        }

        .pagination button.active {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #4facfe;
            font-size: 16px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .action-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .action-btn:hover {
            border-color: #4facfe;
            transform: translateY(-2px);
        }

        .action-btn.active {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-color: #4facfe;
        }

        .action-btn .count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }

        .action-btn.active .count {
            background: rgba(255, 255, 255, 0.3);
        }

        .action-created { border-color: #28a745; }
        .action-created:hover { border-color: #28a745; }
        .action-created.active { background: #28a745; border-color: #28a745; }

        .action-updated { border-color: #ffc107; }
        .action-updated:hover { border-color: #ffc107; }
        .action-updated.active { background: #ffc107; border-color: #ffc107; }

        .action-deleted { border-color: #dc3545; }
        .action-deleted:hover { border-color: #dc3545; }
        .action-deleted.active { background: #dc3545; border-color: #dc3545; }

        .action-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .action-created-badge { background: #28a745; }
        .action-updated-badge { background: #ffc107; }
        .action-deleted-badge { background: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Panel Settings</h1>
            <p>Manage user creation history and system settings</p>
        </div>

        <div class="settings-content">
            <div class="section">
                <h2>User Activity History</h2>
                
                <div id="message"></div>

                <div class="action-filters">
                    <button class="action-btn" id="allActions" onclick="filterByAction('')">
                        All Actions <span class="count" id="allCount">0</span>
                    </button>
                    <button class="action-btn action-created" id="createdActions" onclick="filterByAction('USER_CREATED')">
                        👤 Created Users <span class="count" id="createdCount">0</span>
                    </button>
                    <button class="action-btn action-updated" id="updatedActions" onclick="filterByAction('USER_UPDATED')">
                        ✏️ Updated Users <span class="count" id="updatedCount">0</span>
                    </button>
                    <button class="action-btn action-deleted" id="deletedActions" onclick="filterByAction('USER_DELETED')">
                        🗑️ Deleted Users <span class="count" id="deletedCount">0</span>
                    </button>
                </div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by username, email, admin name, or admin email...">
                    <button onclick="searchUsers()">Search</button>
                    <button onclick="clearSearch()">Clear</button>
                </div>

                <div id="loading" class="loading" style="display: none;">
                    Loading user history...
                </div>

                <div id="userHistory">
                    <table class="history-table" id="historyTable">
                        <thead>
                            <tr>
                                <th>Action</th>
                                <th>Target User</th>
                                <th>User Email</th>
                                <th>User Role</th>
                                <th>Performed By</th>
                                <th>Admin Email</th>
                                <th>Admin Role</th>
                                <th>Date & Time</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                        </tbody>
                    </table>
                    
                    <div id="noData" class="no-data" style="display: none;">
                        No user creation history found.
                    </div>

                    <div id="pagination" class="pagination" style="display: none;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentSearch = '';
        let currentAction = '';
        const limit = 10;

        // Check if user is authenticated
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return false;
            }
            return true;
        }

        // Get auth headers
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        // Load user history
        async function loadUserHistory(page = 1, search = '', action = '') {
            if (!checkAuth()) return;

            const loading = document.getElementById('loading');
            const noData = document.getElementById('noData');
            const tableBody = document.getElementById('historyTableBody');
            const pagination = document.getElementById('pagination');

            loading.style.display = 'block';
            noData.style.display = 'none';
            tableBody.innerHTML = '';
            pagination.style.display = 'none';

            try {
                const queryParams = new URLSearchParams({
                    page: page,
                    limit: limit
                });

                if (search) {
                    queryParams.append('search', search);
                }
                
                if (action) {
                    queryParams.append('action', action);
                }

                const response = await fetch(`/api/auth/user-history?${queryParams}`, {
                    headers: getAuthHeaders()
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch user history');
                }

                const data = await response.json();

                if (data.success && data.activities.length > 0) {
                    displayActivities(data.activities);
                    displayPagination(data);
                    updateActionCounts(data.actionCounts);
                } else {
                    noData.style.display = 'block';
                    updateActionCounts({ USER_CREATED: 0, USER_UPDATED: 0, USER_DELETED: 0 });
                }
            } catch (error) {
                console.error('Error loading user history:', error);
                showMessage('error', 'Failed to load user history. Please try again.');
                noData.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Display activities in table
        function displayActivities(activities) {
            const tableBody = document.getElementById('historyTableBody');
            tableBody.innerHTML = '';

            activities.forEach(activity => {
                const row = document.createElement('tr');
                
                const createdDate = new Date(activity.timestamp).toLocaleString();
                const adminRoleBadge = activity.performedBy.role === 'admin' ? 
                    '<span class="admin-badge">Admin</span>' : 
                    '<span class="user-badge">User</span>';
                const userRoleBadge = activity.targetUser.role === 'admin' ? 
                    '<span class="admin-badge">Admin</span>' : 
                    '<span class="user-badge">User</span>';

                const actionBadge = getActionBadge(activity.action);

                row.innerHTML = `
                    <td>${actionBadge}</td>
                    <td>${activity.targetUser.name}</td>
                    <td>${activity.targetUser.email}</td>
                    <td>${userRoleBadge}</td>
                    <td>${activity.performedBy.name}</td>
                    <td>${activity.performedBy.email}</td>
                    <td>${adminRoleBadge}</td>
                    <td class="date">${createdDate}</td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        // Get action badge HTML
        function getActionBadge(action) {
            switch(action) {
                case 'USER_CREATED':
                    return '<span class="action-badge action-created-badge">👤 Created</span>';
                case 'USER_UPDATED':
                    return '<span class="action-badge action-updated-badge">✏️ Updated</span>';
                case 'USER_DELETED':
                    return '<span class="action-badge action-deleted-badge">🗑️ Deleted</span>';
                default:
                    return '<span class="action-badge">Unknown</span>';
            }
        }

        // Update action counts
        function updateActionCounts(actionCounts) {
            document.getElementById('allCount').textContent = 
                actionCounts.USER_CREATED + actionCounts.USER_UPDATED + actionCounts.USER_DELETED;
            document.getElementById('createdCount').textContent = actionCounts.USER_CREATED;
            document.getElementById('updatedCount').textContent = actionCounts.USER_UPDATED;
            document.getElementById('deletedCount').textContent = actionCounts.USER_DELETED;
        }

        // Filter by action type
        function filterByAction(action) {
            // Remove active class from all buttons
            document.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('active'));
            
            // Add active class to clicked button
            if (action === '') {
                document.getElementById('allActions').classList.add('active');
            } else if (action === 'USER_CREATED') {
                document.getElementById('createdActions').classList.add('active');
            } else if (action === 'USER_UPDATED') {
                document.getElementById('updatedActions').classList.add('active');
            } else if (action === 'USER_DELETED') {
                document.getElementById('deletedActions').classList.add('active');
            }
            
            currentAction = action;
            currentPage = 1;
            loadUserHistory(currentPage, currentSearch, action);
        }

        // Display pagination
        function displayPagination(data) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.textContent = 'Previous';
            prevBtn.disabled = !data.hasPrevPage;
            prevBtn.onclick = () => {
                if (data.hasPrevPage) {
                    currentPage--;
                    loadUserHistory(currentPage, currentSearch, currentAction);
                }
            };
            pagination.appendChild(prevBtn);

            // Page numbers
            for (let i = 1; i <= data.totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                pageBtn.className = i === data.currentPage ? 'active' : '';
                pageBtn.onclick = () => {
                    currentPage = i;
                    loadUserHistory(currentPage, currentSearch, currentAction);
                };
                pagination.appendChild(pageBtn);
            }

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next';
            nextBtn.disabled = !data.hasNextPage;
            nextBtn.onclick = () => {
                if (data.hasNextPage) {
                    currentPage++;
                    loadUserHistory(currentPage, currentSearch, currentAction);
                }
            };
            pagination.appendChild(nextBtn);

            pagination.style.display = 'flex';
        }

        // Search users
        function searchUsers() {
            const searchInput = document.getElementById('searchInput');
            currentSearch = searchInput.value.trim();
            currentPage = 1;
            loadUserHistory(currentPage, currentSearch, currentAction);
        }

        // Clear search
        function clearSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = '';
            currentSearch = '';
            currentPage = 1;
            loadUserHistory(currentPage, currentSearch, currentAction);
        }

        // Show message
        function showMessage(type, message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = type;
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Handle Enter key in search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchUsers();
            }
        });

        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Set default active button
            document.getElementById('allActions').classList.add('active');
            loadUserHistory();
        });
    </script>
</body>
</html>
