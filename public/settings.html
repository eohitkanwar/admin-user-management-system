<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .settings-content {
            padding: 30px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4facfe;
        }

        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #4facfe;
        }

        .search-bar button {
            padding: 12px 24px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .search-bar button:hover {
            background: #3b8bfe;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .history-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e1e5e9;
        }

        .history-table td {
            padding: 15px;
            border-bottom: 1px solid #e1e5e9;
        }

        .history-table tr:hover {
            background: #f8f9fa;
        }

        .admin-badge {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .user-badge {
            background: #6c757d;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .date {
            color: #6c757d;
            font-size: 14px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #e1e5e9;
            background: white;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .pagination button:hover {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
        }

        .pagination button.active {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #4facfe;
            font-size: 16px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Panel Settings</h1>
            <p>Manage user creation history and system settings</p>
        </div>

        <div class="settings-content">
            <div class="section">
                <h2>User Creation History</h2>
                
                <div id="message"></div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by username, email, admin name, or admin email...">
                    <button onclick="searchUsers()">Search</button>
                    <button onclick="clearSearch()">Clear</button>
                </div>

                <div id="loading" class="loading" style="display: none;">
                    Loading user history...
                </div>

                <div id="userHistory">
                    <table class="history-table" id="historyTable">
                        <thead>
                            <tr>
                                <th>User Name</th>
                                <th>User Email</th>
                                <th>User Role</th>
                                <th>Created By</th>
                                <th>Admin Email</th>
                                <th>Admin Role</th>
                                <th>Created Date</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                        </tbody>
                    </table>
                    
                    <div id="noData" class="no-data" style="display: none;">
                        No user creation history found.
                    </div>

                    <div id="pagination" class="pagination" style="display: none;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentSearch = '';
        const limit = 10;

        // Check if user is authenticated
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return false;
            }
            return true;
        }

        // Get auth headers
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        // Load user history
        async function loadUserHistory(page = 1, search = '') {
            if (!checkAuth()) return;

            const loading = document.getElementById('loading');
            const noData = document.getElementById('noData');
            const tableBody = document.getElementById('historyTableBody');
            const pagination = document.getElementById('pagination');

            loading.style.display = 'block';
            noData.style.display = 'none';
            tableBody.innerHTML = '';
            pagination.style.display = 'none';

            try {
                const queryParams = new URLSearchParams({
                    page: page,
                    limit: limit
                });

                if (search) {
                    queryParams.append('search', search);
                }

                const response = await fetch(`/api/auth/user-history?${queryParams}`, {
                    headers: getAuthHeaders()
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch user history');
                }

                const data = await response.json();

                if (data.success && data.users.length > 0) {
                    displayUsers(data.users);
                    displayPagination(data);
                } else {
                    noData.style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading user history:', error);
                showMessage('error', 'Failed to load user history. Please try again.');
                noData.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Display users in table
        function displayUsers(users) {
            const tableBody = document.getElementById('historyTableBody');
            tableBody.innerHTML = '';

            users.forEach(user => {
                const row = document.createElement('tr');
                
                const createdDate = new Date(user.createdAt).toLocaleString();
                const adminRoleBadge = user.createdByRole === 'admin' ? 
                    '<span class="admin-badge">Admin</span>' : 
                    '<span class="user-badge">User</span>';
                const userRoleBadge = user.role === 'admin' ? 
                    '<span class="admin-badge">Admin</span>' : 
                    '<span class="user-badge">User</span>';

                row.innerHTML = `
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>${userRoleBadge}</td>
                    <td>${user.createdByName || 'N/A'}</td>
                    <td>${user.createdByEmail || 'N/A'}</td>
                    <td>${adminRoleBadge}</td>
                    <td class="date">${createdDate}</td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        // Display pagination
        function displayPagination(data) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.textContent = 'Previous';
            prevBtn.disabled = !data.hasPrevPage;
            prevBtn.onclick = () => {
                if (data.hasPrevPage) {
                    currentPage--;
                    loadUserHistory(currentPage, currentSearch);
                }
            };
            pagination.appendChild(prevBtn);

            // Page numbers
            for (let i = 1; i <= data.totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                pageBtn.className = i === data.currentPage ? 'active' : '';
                pageBtn.onclick = () => {
                    currentPage = i;
                    loadUserHistory(currentPage, currentSearch);
                };
                pagination.appendChild(pageBtn);
            }

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next';
            nextBtn.disabled = !data.hasNextPage;
            nextBtn.onclick = () => {
                if (data.hasNextPage) {
                    currentPage++;
                    loadUserHistory(currentPage, currentSearch);
                }
            };
            pagination.appendChild(nextBtn);

            pagination.style.display = 'flex';
        }

        // Search users
        function searchUsers() {
            const searchInput = document.getElementById('searchInput');
            currentSearch = searchInput.value.trim();
            currentPage = 1;
            loadUserHistory(currentPage, currentSearch);
        }

        // Clear search
        function clearSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = '';
            currentSearch = '';
            currentPage = 1;
            loadUserHistory(currentPage, currentSearch);
        }

        // Show message
        function showMessage(type, message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = type;
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Handle Enter key in search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchUsers();
            }
        });

        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadUserHistory();
        });
    </script>
</body>
</html>
